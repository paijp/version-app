name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | sed 's/.*versionName \"\(.*\)\"/\1/' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/VersionApp-${{ steps.version.outputs.version }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: VersionApp-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/VersionApp-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/VersionApp-*.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## VersionApp ${{ github.ref_name }}
            バージョン情報を表示するテストアプリです。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
